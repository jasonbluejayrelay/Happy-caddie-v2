name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # lets you trigger a build manually from the Actions tab

permissions:
  contents: write       # needed to publish the APK as a Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Android project
        run: npx cap add android

      - name: Apply camera + GPS permissions
        run: cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Generate app icon + splash
        run: npx capacitor-assets generate --android

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Stage APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk golf-tracker.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: golf-tracker-apk
          path: golf-tracker.apk

      - name: Publish APK to a Release (easy phone download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Golf Tracker (latest build)
          body: |
            Personal Golf Shot Tracker APK.

            **Install on Android:**
            1. Tap `golf-tracker.apk` below to download it on your phone.
            2. Open the downloaded file.
            3. If prompted, allow "Install from unknown sources" for your browser.
            4. Tap Install. Grant Location + Camera when the app asks.
          files: golf-tracker.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
