name: Build Android APK

on:
  push:
    branches: [ '**' ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Generate Android project
        run: npx cap add android

      - name: Apply camera + GPS permissions
        run: cp AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Generate app icon + splash
        run: npx capacitor-assets generate --android

      - name: Sync web assets into Android project
        run: npx cap sync android

      - name: Use a stable debug signing key
        # Without this, the debug keystore is auto-generated per machine, so every
        # CI build signs the APK with a different key and Android refuses to update
        # an installed app ("App not installed"). The default keystore location
        # ($HOME/.android) isn't reliable on hosted runners, so wire our committed
        # keystore into the module's debug signingConfig explicitly (AGP applies a
        # signingConfigs.debug to the debug build type automatically).
        run: |
          cp keystore/debug.keystore android/app/debug.keystore
          node -e '
            const fs = require("fs");
            const f = "android/app/build.gradle";
            let s = fs.readFileSync(f, "utf8");
            const block = `\n    signingConfigs {\n        debug {\n            storeFile file("debug.keystore")\n            storePassword "android"\n            keyAlias "androiddebugkey"\n            keyPassword "android"\n        }\n    }\n`;
            s = s.replace(/android\s*\{/, m => m + block);
            fs.writeFileSync(f, s);
            console.log("Injected fixed debug signingConfig");
          '

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Stage APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk golf-tracker.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: golf-tracker-apk
          path: golf-tracker.apk
          retention-days: 7

      - name: Refresh 'latest' release tag
        # Delete the existing rolling release + tag so the next step can recreate
        # it pointing at the current main commit. Without this, action-gh-release
        # leaves the 'latest' tag stuck on whatever commit first created it and
        # the asset upload races against an undiscoverable tag.
        if: github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --cleanup-tag --yes || true
          sleep 5

      - name: Publish APK to Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          target_commitish: ${{ github.sha }}
          make_latest: true
          name: Golf Tracker (latest build)
          body: |
            Personal Golf Shot Tracker APK.

            **Install on Android:**
            1. Tap `golf-tracker.apk` below to download it on your phone.
            2. Open the downloaded file.
            3. If prompted, allow "Install from unknown sources" for your browser.
            4. Tap Install. Grant Location + Camera when the app asks.
          files: golf-tracker.apk
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
